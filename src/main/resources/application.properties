# Nome da aplicaçăo
spring.application.name=baozistore
# ===================================
# CONFIGURAÇĂO DO BANCO H2
# ===================================
# Habilita o console web do H2 (acessível no navegador)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
# Configuraçőes da fonte de dados (datasource)
spring.datasource.url=jdbc:h2:mem:baozidb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
# Configuraçőes do JPA/Hibernate
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
